server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
- job_name: honeypot_logs
  static_configs:
  - targets:
      - localhost
    labels:
      job: honeypot
      __path__: /app/logs/*.json
  pipeline_stages:
  - json:
      expressions:
        timestamp: timestamp
        event_type: event_type
        src_ip: src_ip
        user: user
        command: command
  - timestamp:
      source: timestamp
      format: RFC3339
  - labels:
      event_type:
      src_ip:
      user: